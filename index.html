<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamFinance OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        /* Corregido: El modal ahora inicia oculto con display: none */
        .modal-hidden { display: none !important; }
        .nav-item:active { transform: scale(0.9); transition: 0.2s; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center">
        <div>
            <p class="text-gray-400 text-sm">Bienvenido, Familia 👋</p>
            <h1 class="text-2xl font-bold text-white">FamFinance <span class="text-blue-500">OS</span></h1>
        </div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-600 flex items-center justify-center font-bold">F</div>
    </header>

    <div class="px-6 mb-8">
        <div class="glass p-6 rounded-3xl bg-gradient-to-br from-blue-600/10 to-purple-600/10">
            <p class="text-gray-400 text-xs mb-1 uppercase tracking-widest">Balance Total</p>
            <h2 id="totalBalance" class="text-4xl font-black mb-4">$0.00</h2>
            <div class="flex gap-3">
                <div class="bg-green-500/10 p-3 rounded-2xl flex-1 border border-green-500/20 text-center">
                    <p class="text-[10px] text-green-400 uppercase">Ingresos</p>
                    <p id="totalIncome" class="font-bold text-sm">+$0</p>
                </div>
                <div class="bg-red-500/10 p-3 rounded-2xl flex-1 border border-red-500/20 text-center">
                    <p class="text-[10px] text-red-400 uppercase">Gastos</p>
                    <p id="totalExpenses" class="font-bold text-sm">-$0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="px-6 mb-8">
        <div class="glass p-4 rounded-3xl">
            <canvas id="expenseChart" height="200"></canvas>
        </div>
    </div>

    <div class="px-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-200">Actividad Reciente</h3>
            <button onclick="clearData()" class="text-[10px] text-red-400 border border-red-400/30 px-2 py-1 rounded-lg">LIMPIAR</button>
        </div>
        <div id="transactionList" class="space-y-3"></div>
    </div>

    <div id="modal" class="modal-hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/70 backdrop-blur-md">
        <div class="glass w-full max-w-sm p-6 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-xl font-extrabold mb-6 text-center">Nuevo Movimiento</h2>
            <div class="space-y-4">
                <input id="desc" type="text" placeholder="¿En qué se gastó?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
                
                <div class="flex gap-3">
                    <input id="amount" type="number" placeholder="Monto" class="w-2/3 bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <select id="type" class="w-1/3 bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <option value="expense">Gasto</option>
                        <option value="income">Ingreso</option>
                    </select>
                </div>

                <select id="category" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="Comida">🍔 Comida</option>
                    <option value="Hogar">🏠 Hogar</option>
                    <option value="Ocio">🎮 Ocio</option>
                    <option value="Salud">💊 Salud</option>
                    <option value="Transporte">🚗 Transporte</option>
                    <option value="Otros">✨ Otros</option>
                </select>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-2xl bg-white/10 font-bold text-sm">CANCELAR</button>
                    <button onclick="saveTransaction()" class="flex-1 p-4 rounded-2xl bg-blue-600 font-bold text-sm shadow-lg shadow-blue-600/30">GUARDAR</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass h-16 rounded-full flex items-center justify-around px-2 shadow-2xl">
        <button class="nav-item text-blue-500"><i class="fas fa-home text-xl"></i></button>
        <button class="nav-item text-gray-500"><i class="fas fa-chart-pie text-xl"></i></button>
        <button onclick="openModal()" class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-xl -mt-12 border-4 border-[#0f172a]">
            <i class="fas fa-plus text-lg"></i>
        </button>
        <button class="nav-item text-gray-500"><i class="fas fa-wallet text-xl"></i></button>
        <button class="nav-item text-gray-500"><i class="fas fa-cog text-xl"></i></button>
    </nav>

    <script>
        let transactions = JSON.parse(localStorage.getItem('famFinanceData')) || [];
        let myChart = null;

        function openModal() { document.getElementById('modal').classList.remove('modal-hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('modal-hidden'); }

        function saveTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;

            if (!desc || isNaN(amount)) return alert("Escribe una descripción y un monto válido.");

            transactions.push({ id: Date.now(), desc, amount, type, category, date: new Date().toLocaleDateString() });
            localStorage.setItem('famFinanceData', JSON.stringify(transactions));
            
            closeModal();
            updateUI();
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('famFinanceData', JSON.stringify(transactions));
            updateUI();
        }

        function clearData() {
            if(confirm("¿Borrar todos los datos?")) {
                transactions = [];
                localStorage.removeItem('famFinanceData');
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let inc = 0, exp = 0, cats = {};

            transactions.slice().reverse().forEach(t => {
                if (t.type === 'income') inc += t.amount;
                else { exp += t.amount; cats[t.category] = (cats[t.category] || 0) + t.amount; }

                const item = document.createElement('div');
                item.className = 'glass p-4 rounded-2xl flex items-center justify-between';
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl ${t.type === 'income' ? 'bg-green-500/20 text-green-500' : 'bg-red-500/20 text-red-500'} flex items-center justify-center text-xs">
                            <i class="fas ${t.type === 'income' ? 'fa-arrow-trend-up' : 'fa-basket-shopping'}"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold">${t.desc}</p>
                            <p class="text-[10px] text-gray-500">${t.category}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-bold text-sm ${t.type === 'income' ? 'text-green-400' : 'text-red-400'}">${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}</p>
                        <button onclick="deleteTransaction(${t.id})" class="text-gray-700 text-xs"><i class="fas fa-trash"></i></button>
                    </div>`;
                list.appendChild(item);
            });

            document.getElementById('totalBalance').innerText = `$${(inc - exp).toFixed(2)}`;
            document.getElementById('totalIncome').innerText = `+$${inc.toFixed(0)}`;
            document.getElementById('totalExpenses').innerText = `-$${exp.toFixed(0)}`;
            updateChart(cats);
        }

        function updateChart(data) {
            const ctx = document.getElementById('expenseChart');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#3b82f6', '#f97316', '#a855f7', '#ef4444', '#10b981', '#facc15'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } },
                    maintainAspectRatio: false,
                    cutout: '70%'
                }
            });
        }

        window.onload = updateUI;
    </script>
</body>
</html>
