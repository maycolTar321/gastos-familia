<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamFinance OS Pro - Edición Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .modal-hidden { display: none !important; }
        .nav-item:active { transform: scale(0.9); transition: 0.2s; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 flex justify-between items-center">
        <div>
            <p class="text-gray-400 text-xs uppercase tracking-tighter">Control de Gastos</p>
            <h1 class="text-2xl font-bold text-white tracking-tight">FamFinance <span class="text-blue-500">Bs</span></h1>
        </div>
        <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black shadow-lg shadow-blue-500/20">B</div>
    </header>

    <div class="px-6 mb-8">
        <div class="glass p-8 rounded-[2.5rem] bg-gradient-to-br from-blue-600/10 to-purple-600/10 text-center">
            <p class="text-gray-400 text-xs mb-1 uppercase tracking-widest">Saldo en Bolivianos</p>
            <h2 id="totalBalance" class="text-5xl font-black mb-6 tracking-tighter">Bs 0.00</h2>
            <div class="flex gap-3">
                <div class="bg-white/5 p-3 rounded-2xl flex-1 border border-white/5">
                    <p class="text-[10px] text-green-400 uppercase font-bold">Ingresos</p>
                    <p id="totalIncome" class="font-bold text-sm">Bs 0</p>
                </div>
                <div class="bg-white/5 p-3 rounded-2xl flex-1 border border-white/5">
                    <p class="text-[10px] text-red-400 uppercase font-bold">Gastos</p>
                    <p id="totalExpenses" class="font-bold text-sm">Bs 0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="px-6 mb-8">
        <div class="glass p-4 rounded-3xl h-48">
            <canvas id="expenseChart"></canvas>
        </div>
    </div>

    <div class="px-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-200 text-sm">Historial de Movimientos</h3>
            <button onclick="clearData()" class="text-[10px] text-red-400/50 uppercase tracking-widest">Limpiar todo</button>
        </div>
        <div id="transactionList" class="space-y-3">
            </div>
    </div>

    <div id="modal" class="modal-hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="glass w-full max-w-sm p-8 rounded-[3rem]">
            <h2 id="modalTitle" class="text-xl font-black mb-6 text-center tracking-tight">Nuevo Registro</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input id="desc" type="text" placeholder="Descripción (ej. Almuerzo)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500">
                
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <span class="absolute left-4 top-4 text-gray-500 text-sm">Bs</span>
                        <input id="amount" type="number" placeholder="0.00" class="w-full bg-white/5 border border-white/10 p-4 pl-10 rounded-2xl text-white outline-none">
                    </div>
                    <select id="type" class="bg-slate-800 border border-white/10 px-4 rounded-2xl text-white outline-none text-xs">
                        <option value="expense">Gasto</option>
                        <option value="income">Ingreso</option>
                    </select>
                </div>

                <select id="category" class="w-full bg-slate-800 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <option value="Comida">🍔 Comida</option>
                    <option value="Hogar">🏠 Hogar</option>
                    <option value="Ocio">🎮 Ocio</option>
                    <option value="Salud">💊 Salud</option>
                    <option value="Transporte">🚗 Transporte</option>
                    <option value="Otros">✨ Otros</option>
                </select>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-2xl bg-white/5 font-bold text-[10px] uppercase">Cancelar</button>
                    <button onclick="saveTransaction()" id="saveBtn" class="flex-1 p-4 rounded-2xl bg-blue-600 font-bold text-[10px] uppercase shadow-lg shadow-blue-600/40">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-8 left-8 right-8 glass h-16 rounded-full flex items-center justify-around px-2 shadow-2xl border-t border-white/10">
        <button class="text-blue-500"><i class="fas fa-house text-xl"></i></button>
        <button class="text-gray-500"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="openAddModal()" class="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl -mt-14 border-[6px] border-[#0f172a] active:scale-90 transition">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <button class="text-gray-500"><i class="fas fa-piggy-bank text-xl"></i></button>
        <button class="text-gray-500"><i class="fas fa-user-gear text-xl"></i></button>
    </nav>

    <script>
        let transactions = JSON.parse(localStorage.getItem('famFinanceData')) || [];
        let myChart = null;

        function formatBs(val) {
            return "Bs " + val.toLocaleString('es-BO', {minimumFractionDigits: 2});
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Nuevo Registro";
            document.getElementById('editId').value = "";
            document.getElementById('desc').value = "";
            document.getElementById('amount').value = "";
            document.getElementById('saveBtn').innerText = "GUARDAR";
            document.getElementById('modal').classList.remove('modal-hidden');
        }

        // --- FUNCIÓN PARA EDITAR ---
        function openEditModal(id) {
            const t = transactions.find(item => item.id === id);
            if (!t) return;

            document.getElementById('modalTitle').innerText = "Editar Registro";
            document.getElementById('editId').value = t.id;
            document.getElementById('desc').value = t.desc;
            document.getElementById('amount').value = t.amount;
            document.getElementById('type').value = t.type;
            document.getElementById('category').value = t.category;
            document.getElementById('saveBtn').innerText = "ACTUALIZAR";
            document.getElementById('modal').classList.remove('modal-hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('modal-hidden'); }

        function saveTransaction() {
            const editId = document.getElementById('editId').value;
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;

            if (!desc || isNaN(amount)) return alert("Completa los datos correctamente.");

            if (editId) {
                // Actualizar existente
                const index = transactions.findIndex(t => t.id == editId);
                transactions[index] = { ...transactions[index], desc, amount, type, category };
            } else {
                // Nuevo registro
                transactions.push({ id: Date.now(), desc, amount, type, category, date: new Date().toLocaleDateString() });
            }

            localStorage.setItem('famFinanceData', JSON.stringify(transactions));
            closeModal();
            updateUI();
        }

        function deleteTransaction(e, id) {
            e.stopPropagation(); // Evita que se abra el modal de editar al borrar
            if(confirm("¿Eliminar este movimiento?")) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('famFinanceData', JSON.stringify(transactions));
                updateUI();
            }
        }

        function clearData() {
            if(confirm("¿Reiniciar toda la contabilidad?")) {
                transactions = [];
                localStorage.removeItem('famFinanceData');
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let inc = 0, exp = 0, cats = {};

            transactions.slice().reverse().forEach(t => {
                if (t.type === 'income') inc += t.amount;
                else { exp += t.amount; cats[t.category] = (cats[t.category] || 0) + t.amount; }

                const item = document.createElement('div');
                item.className = 'glass p-4 rounded-2xl flex items-center justify-between active:bg-white/10 transition cursor-pointer';
                item.onclick = () => openEditModal(t.id); // Click para editar
                
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl ${t.type === 'income' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'} flex items-center justify-center border border-white/5">
                            <i class="fas ${t.type === 'income' ? 'fa-arrow-up' : 'fa-cart-shopping'} text-xs"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold tracking-tight">${t.desc}</p>
                            <p class="text-[10px] text-gray-500 uppercase font-medium">${t.category} • ${t.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-black text-sm ${t.type === 'income' ? 'text-green-400' : 'text-red-400'}">
                            ${t.type === 'income' ? '+' : '-'}${formatBs(t.amount)}
                        </p>
                        <button onclick="deleteTransaction(event, ${t.id})" class="text-gray-700 hover:text-red-500 p-2"><i class="fas fa-trash-can text-xs"></i></button>
                    </div>`;
                list.appendChild(item);
            });

            document.getElementById('totalBalance').innerText = formatBs(inc - exp);
            document.getElementById('totalIncome').innerText = formatBs(inc);
            document.getElementById('totalExpenses').innerText = formatBs(exp);

            updateChart(cats);
        }

        function updateChart(data) {
            const ctx = document.getElementById('expenseChart');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#3b82f6', '#f97316', '#a855f7', '#ef4444', '#10b981', '#facc15'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 9, weight: '600' }, boxWidth: 10 } } },
                    maintainAspectRatio: false,
                    cutout: '75%'
                }
            });
        }

        window.onload = updateUI;
    </script>
</body>
</html>
